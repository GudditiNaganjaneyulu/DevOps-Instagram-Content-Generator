services:
  - type: web
    name: devops-runtime-emotions-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install poetry==1.8.3 && poetry install --no-dev --no-interaction
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: STABLE_HORDE_API_KEY
        sync: false
      - key: FAL_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_ID
        sync: false
      - key: GITHUB_SECRET
        sync: false
      - key: LOKI_URL
        sync: false
      - key: LOKI_USERNAME
        sync: false
      - key: LOKI_PASSWORD
        sync: false
      - key: OTEL_ENDPOINT
        sync: false
      - key: OTEL_HEADERS
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
